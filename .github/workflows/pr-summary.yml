---
name: PR Summary

on:
  pull_request:
    branches:
      - main
      - master-gke
    types:
      - opened
      - synchronize
      - reopened

env:
  LINES_THRESHOLD: 500

jobs:
  pr-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Get previous tag
        id: prev_tag
        run: |
          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "previous_tag=$previous_tag" >> $GITHUB_OUTPUT

      - name: Calculate lines changed
        id: diff_stats
        run: |
          if [[ -z "${{ steps.prev_tag.outputs.previous_tag }}" ]]; then
            echo "lines_changed=0" >> $GITHUB_OUTPUT
            echo "bump_type=minor" >> $GITHUB_OUTPUT
          else
            total_lines=$(
              git diff --stat \
                ${{ steps.prev_tag.outputs.previous_tag }}..HEAD \
                -- '*.yml' '*.yaml' '*.json' '*.ts' '*.js' \
                -- '*.py' '*.go' '*.java' \
                | tail -1 \
                | awk '{print $4}' \
                | tr -d ','
            )
            if [[ -z "$total_lines" ]]; then
              total_lines=0
            fi
            echo "lines_changed=$total_lines" >> $GITHUB_OUTPUT

            threshold=${{ env.LINES_THRESHOLD }}
            if [[ "$total_lines" -gt "$threshold" ]]; then
              echo "bump_type=major" >> $GITHUB_OUTPUT
            else
              echo "bump_type=minor" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate changelog via release-drafter
        id: changelog
        uses: release-drafter/release-drafter@v6
        with:
          config-name: release-drafter-config.yml
          commitish: ${{ github.event.pull_request.base.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get current date
        id: date
        run: echo "date=$(date '+%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const previousTag = '${{ steps.prev_tag.outputs.previous_tag }}' || 'No previous tag';
            const linesChanged = '${{ steps.diff_stats.outputs.lines_changed }}';
            const bumpType = '${{ steps.diff_stats.outputs.bump_type }}';
            const threshold = ${{ env.LINES_THRESHOLD }};
            const prNumber = context.payload.pull_request.number;
            const prTitle = context.payload.pull_request.title;
            const baseBranch = context.payload.pull_request.base.ref;

            let changelogBody = process.env.CHANGELOG || '> No changes detected';

            const comment = `
            ## Release Summary for PR #${prNumber}: ${prTitle}

            **Target Branch:** \`${baseBranch}\`
            **Previous Tag:** \`${previousTag}\`
            **Predicted Bump:** \`${bumpType}\`
            **Lines Changed:** \`${linesChanged}\` (threshold: \`${threshold}\`)

            ---
            ### Changelog

            ${changelogBody}

            ---
            *Generated by PR Summary workflow*
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment
            });

      - name: Print summary
        run: |
          echo "PR Summary generated for #${{ github.event.pull_request.number }}"
          echo "Previous tag: ${{ steps.prev_tag.outputs.previous_tag }}"
          echo "Lines changed: ${{ steps.diff_stats.outputs.lines_changed }}"
          echo "Predicted bump: ${{ steps.diff_stats.outputs.bump_type }}"
